<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trip Saving Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="hero">

        <h1>🏖️ Trip Saving</h1>

        <p>
            Goal ₹111,000
        </p>

    </div>

    <div class="stats-grid">

        <div class="stat-card">
            <span>Total Saved</span>
            <h2 id="savedAmount">₹0</h2>
        </div>

        <div class="stat-card">
            <span>Progress</span>
            <h2 id="progressPercent">0%</h2>
        </div>

        <div class="stat-card">
            <span>Remaining</span>
            <h2 id="remainingAmount">₹0</h2>
        </div>

        <div class="stat-card">
            <span>Members</span>
            <h2 id="memberCount">0</h2>
        </div>

    </div>

    <div class="glass ring-box">

        <h2>Goal Progress</h2>

        <div class="ring-container">

            <canvas id="goalChart"></canvas>

            <div class="ring-text">
                <span id="centerAmount">₹0</span>
            </div>

        </div>

    </div>

    <div class="glass">

        <h2>Monthly Collection</h2>

        <canvas id="monthlyChart"></canvas>

    </div>

    <div class="glass">

        <h2>Contribution Distribution</h2>

        <canvas id="memberChart"></canvas>

    </div>

    <div class="glass">

        <h2>🏆 Top Contributors</h2>

        <div id="leaderboard"></div>

    </div>

    <div class="glass">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search Member"
        >

    </div>

    <div id="memberCards"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
